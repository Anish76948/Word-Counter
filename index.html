<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=JetBrains+Mono">

    <link rel="stylesheet" href="style.css">

    <title>Anish Word Counter</title>
</head>

<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col text-center">
                <h2 class="page_title">
                    🚀 Smart Word Counter
                </h2>
                <p>Type your text below to get real-time word, character, and line count.</p>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col">
                <div class="field">
                    <span class="btn btn-danger mb-2" id="clear_button">Clear</span>
                    <label for="textarea" class="form-label">Enter Text</label>
                    <textarea class="form-control" id="textarea" rows="10" placeholder="Start typing here..."></textarea>
                </div>
            </div>
        </div>

        <div class="row mt-4 text-center">
            <div class="col" id="word_counter">
                <strong>Words:</strong> 0
            </div>
            <div class="col" id="character_counter">
                <strong>Characters:</strong> 0
            </div>
            <div class="col" id="line_counter">
                <strong>Lines:</strong> 1
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
